<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Railway Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E16;
    --panel:#12192A;
    --panel-2:#1A2334;
    --line:#26314A;
    --track:#3A4558;
    --text:#EDEFF5;
    --text-dim:#8D97AE;
    --amber:#F2B84B;
    --red:#E5484D;
    --green:#35D07F;
    --yellow:#FFD23F;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:repeating-linear-gradient(90deg, rgba(58,69,88,0.35) 0 8px, transparent 8px 46px);
    background-position:0 78%;
    background-size:100% 4px;
    opacity:0.5;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  .nav{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 6vw;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:12px;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.06em;}
  .brand-mark{
    width:40px;height:40px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(145deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);
  }
  .links{display:flex;gap:2.2rem;}
  .links a{color:var(--text-dim);text-decoration:none;font-size:0.95rem;font-weight:500;position:relative;}
  .links a::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:var(--yellow);transition:width 0.25s ease;}
  .links a:hover{color:var(--text);}
  .links a:hover::after{width:100%;}
  .links a.active{color:var(--text);}
  .links a.active::after{width:100%;}

  .wrap{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:center;
    min-height:calc(100vh - 89px);
    padding:8vw 6vw;
  }

  .ticket{
    display:flex;
    width:min(760px,100%);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(0,0,0,0.6);
  }

  .stub{
    width:130px;
    flex-shrink:0;
    background:linear-gradient(160deg,var(--panel-2),var(--panel));
    border-right:1px dashed var(--track);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:24px 0;
    position:relative;
  }
  .stub::before,.stub::after{
    content:"";
    position:absolute;
    width:20px;height:20px;
    background:var(--bg);
    border-radius:50%;
    right:-11px;
  }
  .stub::before{top:-11px;}
  .stub::after{bottom:-11px;}
  .stub .rot{
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.22em;
    color:var(--yellow);
    text-transform:uppercase;
  }
  .stub .glyph{
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
  }

  .panel{
    flex:1;
    padding:38px 40px;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--yellow);
    background:rgba(255,210,63,0.08);
    border:1px solid rgba(255,210,63,0.25);
    padding:6px 12px;border-radius:999px;
    margin-bottom:18px;
  }
  h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:2.4rem;
    letter-spacing:0.01em;
    margin-bottom:6px;
  }
  .sub{
    color:var(--text-dim);
    font-size:0.92rem;
    margin-bottom:26px;
  }

  form{display:flex;flex-direction:column;gap:14px;}
  .field label{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  input{
    width:100%;
    padding:12px 14px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:9px;
    color:var(--text);
    font-size:0.95rem;
    font-family:'Inter',sans-serif;
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease;
  }
  input::placeholder{color:#5A6580;}
  input:focus{
    border-color:var(--yellow);
    box-shadow:0 0 0 3px rgba(255,210,63,0.15);
  }

  button{
    width:100%;
    padding:13px 14px;
    border:0;
    border-radius:9px;
    background:var(--yellow);
    color:#161116;
    font-weight:700;
    font-size:0.95rem;
    cursor:pointer;
    margin-top:6px;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow:0 8px 24px -8px rgba(255,210,63,0.5);
  }
  button:hover{transform:translateY(-2px);box-shadow:0 12px 30px -8px rgba(255,210,63,0.65);}

  .divider{
    display:flex;align-items:center;gap:12px;
    margin:20px 0 4px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;
    color:var(--text-dim);
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}

  .banner{
    display:none;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.8rem;
    padding:10px 14px;
    border-radius:8px;
    margin-bottom:16px;
  }
  .banner.show{display:flex;}
  .banner.error{background:rgba(229,72,77,0.1);border:1px solid rgba(229,72,77,0.3);color:var(--red);}

  .link{
    text-align:center;
    font-size:0.88rem;
    color:var(--text-dim);
  }
  .link a{color:var(--yellow);text-decoration:none;font-weight:600;}
  .link a:hover{text-decoration:underline;}

  @media (max-width:560px){
    .ticket{flex-direction:column;}
    .stub{width:100%;flex-direction:row;border-right:none;border-bottom:1px dashed var(--track);padding:14px 20px;}
    .stub .rot{writing-mode:horizontal-tb;transform:none;}
    .stub::before,.stub::after{display:none;}
  }
</style>
</head>
<body>

  <header class="nav">
    <div class="brand">
      <div class="brand-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="6" width="18" height="11" rx="2" fill="#FFD23F"/>
          <circle cx="7.5" cy="19" r="2" fill="#EDEFF5"/>
          <circle cx="16.5" cy="19" r="2" fill="#EDEFF5"/>
          <rect x="6" y="8.5" width="4" height="4" rx="0.6" fill="#0A0E16"/>
          <rect x="14" y="8.5" width="4" height="4" rx="0.6" fill="#0A0E16"/>
        </svg>
      </div>
      <span>Railway Booking</span>
    </div>
    <nav class="links">
      <a href="../index.html">Home</a>
      <a href="./register.html" class="active">Register</a>
      <a href="./login.html">Login</a>
    </nav>
  </header>

  <main class="wrap">
    <div class="ticket">
      <div class="stub">
        <div class="glyph">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="8" r="3.4" stroke="#8D97AE" stroke-width="1.6"/><path d="M3 20c0-3.8 3.1-6 7-6s7 2.2 7 6" stroke="#8D97AE" stroke-width="1.6" stroke-linecap="round"/><path d="M17 8h4M19 6v4" stroke="#8D97AE" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <span class="rot mono">NEW&nbsp;PASS</span>
      </div>
      <div class="panel">
        <div class="eyebrow">Boarding &middot; First-time rider</div>
        <h1>Create your account</h1>
        <p class="sub">Register once to book seats and track your locks.</p>

        <div id="banner" class="banner"></div>

        <form action="register_action.php" method="POST">
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Full name" required>
          </div>
          <div class="field">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Age" min="1" required>
          </div>
          <div class="field">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="City" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label for="ruser">Username</label>
            <input type="text" id="ruser" name="user" placeholder="Choose a username" required>
          </div>
          <div class="field">
            <label for="rpass">Password</label>
            <input type="password" id="rpass" name="pass" placeholder="Choose a password" required>
          </div>
          <button type="submit">Create account</button>
        </form>

        <div class="divider">ALREADY BOOKED BEFORE</div>
        <div class="link">Already registered? <a href="./login.html">Login</a></div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const banner = document.getElementById("banner");
    if (params.get("error")) {
      banner.textContent = params.get("error");
      banner.className = "banner show error";
    }
  </script>

</body>
</html>
